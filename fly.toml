# Fly.io config for OpenBook.
# Key points:
#  - A persistent volume is mounted at /data and DATA_DIR points the database and
#    uploads there, so accounts/posts survive deploys and restarts.
#  - Machines auto-stop when idle and auto-start on the next request, so you only
#    pay for compute while the app is actually being used; the volume persists.
# Change `app` if the name is taken, and `primary_region` to one near your users
# (run `fly platform regions` to list them). The volume must be in this region.

app = "openbook-social"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  DATA_DIR = "/data"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "openbook_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
