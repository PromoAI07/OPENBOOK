<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenBook</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%235b51e8'/><text x='16' y='23' font-size='20' fill='white' text-anchor='middle' font-family='Arial' font-weight='bold'>O</text></svg>" />
  <script>try{var t=localStorage.getItem('ob_theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- Top bar: left (logo + search), center (primary tabs), right (utility) -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo" data-nav="feed">
        <span class="brand-mark">O</span>
        <span class="brand name">OpenBook</span>
      </div>
      <div class="search">
        <input type="text" id="searchInput" placeholder="Search OpenBook" autocomplete="off" />
      </div>
    </div>
    <nav class="nav-primary">
      <button class="nav-tab" data-nav="feed" title="Home"><span class="ti">&#127968;</span><span class="tl">Home</span></button>
      <button class="nav-tab" data-nav="communities" title="Communities"><span class="ti">&#128227;</span><span class="tl">Communities</span></button>
      <button class="nav-tab" data-nav="marketplace" title="Marketplace"><span class="ti">&#128722;</span><span class="tl">Marketplace</span></button>
      <button class="nav-tab" data-nav="dashboard" title="Professional dashboard"><span class="ti">&#128202;</span><span class="tl">Dashboard</span></button>
    </nav>
    <div class="topbar-right">
      <button class="nav-btn" data-nav="messages" title="Messages">
        &#128172;<span class="badge hidden" id="messagesBadge">0</span>
      </button>
      <button class="nav-btn" id="notifBtn" title="Notifications">
        &#128276;<span class="badge hidden" id="notifBadge">0</span>
      </button>
      <button class="nav-btn" id="meBtn" title="Your profile"></button>
    </div>
  </header>

  <!-- Notifications dropdown -->
  <div class="dropdown hidden" id="notifDropdown">
    <div class="dhead"><h3>Notifications</h3></div>
    <div id="notifList"></div>
  </div>

  <!-- Main app -->
  <div class="layout">
    <aside class="rail" id="leftRail"></aside>
    <main class="center" id="view"></main>
    <aside class="rail" id="rightRail"></aside>
  </div>

  <!-- Mobile-only bottom navigation (the primary destinations). -->
  <nav class="bottom-nav" id="bottomNav">
    <button class="nav-tab" data-nav="feed" title="Home"><span class="ti">&#127968;</span><span class="tl">Home</span></button>
    <button class="nav-tab" data-nav="communities" title="Communities"><span class="ti">&#128227;</span><span class="tl">Communities</span></button>
    <button class="nav-tab" data-nav="marketplace" title="Marketplace"><span class="ti">&#128722;</span><span class="tl">Market</span></button>
    <button class="nav-tab" data-nav="dashboard" title="Dashboard"><span class="ti">&#128202;</span><span class="tl">Dashboard</span></button>
  </nav>

  <!-- Mount points for modals, toasts, story viewer -->
  <div id="modalRoot"></div>
  <div id="toastRoot"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/chat.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
