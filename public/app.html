<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenBook</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%235b51e8'/><text x='16' y='23' font-size='20' fill='white' text-anchor='middle' font-family='Arial' font-weight='bold'>O</text></svg>" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- Top bar -->
  <header class="topbar">
    <div class="logo" data-nav="feed">
      <span class="brand-mark">O</span>
      <span class="brand name">OpenBook</span>
    </div>
    <div class="search">
      <input type="text" id="searchInput" placeholder="Search OpenBook" autocomplete="off" />
    </div>
    <nav class="nav">
      <button class="nav-btn" data-nav="feed" title="Home">&#127968;</button>
      <button class="nav-btn" data-nav="friends" title="Friends">
        &#128101;<span class="badge hidden" id="friendsBadge">0</span>
      </button>
      <button class="nav-btn" data-nav="marketplace" title="Marketplace">&#128722;</button>
      <button class="nav-btn" data-nav="groups" title="Groups">&#127760;</button>
      <button class="nav-btn" data-nav="messages" title="Messages">
        &#128172;<span class="badge hidden" id="messagesBadge">0</span>
      </button>
      <button class="nav-btn" id="notifBtn" title="Notifications">
        &#128276;<span class="badge hidden" id="notifBadge">0</span>
      </button>
      <button class="nav-btn" id="meBtn" title="Your profile"></button>
    </nav>
  </header>

  <!-- Notifications dropdown -->
  <div class="dropdown hidden" id="notifDropdown">
    <div class="dhead"><h3>Notifications</h3></div>
    <div id="notifList"></div>
  </div>

  <!-- Main app -->
  <div class="layout">
    <aside class="rail" id="leftRail"></aside>
    <main class="center" id="view"></main>
    <aside class="rail" id="rightRail"></aside>
  </div>

  <!-- Mount points for modals, toasts, story viewer -->
  <div id="modalRoot"></div>
  <div id="toastRoot"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/chat.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
