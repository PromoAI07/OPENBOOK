<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenBook Owner Analytics</title>
  <script>try{var t=localStorage.getItem('ob_theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .admin-wrap { max-width: 920px; margin: 0 auto; padding: 24px; }
    .admin-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
    .admin-stat { padding: 16px; }
    .admin-stat .num { font-size: 26px; font-weight: 800; color: var(--text); line-height: 1.1; }
    .admin-stat .lbl { font-size: 13px; font-weight: 600; color: var(--text-soft); margin-top: 4px; }
  </style>
</head>
<body>
  <div class="admin-wrap">
    <div class="admin-top">
      <div class="pname">&#128202; Owner analytics</div>
      <a class="btn" href="/app">Back to OpenBook</a>
    </div>
    <div id="view"><div class="card"><div class="empty" style="padding:40px">Loading...</div></div></div>
    <div id="sugView"></div>
    <div class="shint" style="font-size:12px;margin-top:16px">Private to the platform owner. Aggregate usage only, no personal data.</div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    (function () {
      var view = document.getElementById('view');
      function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]); }); }
      function statCard(v, l, h) {
        return '<div class="card admin-stat"><div class="num">' + esc(v) + '</div><div class="lbl">' + esc(l) + '</div>' +
          (h ? '<div class="shint" style="font-size:12px;margin-top:2px">' + esc(h) + '</div>' : '') + '</div>';
      }
      function fmtDur(sec) { if (!sec) return '0s'; var m = Math.floor(sec / 60), s = sec % 60; return m ? (m + 'm ' + s + 's') : (s + 's'); }
      function barList(rows) {
        if (!rows || !rows.length) return '<div class="shint" style="font-size:13px">No data yet.</div>';
        var max = Math.max.apply(null, rows.map(function (r) { return r.c; })) || 1;
        return rows.map(function (r) {
          return '<div class="bar-row"><span class="bar-label">' + esc(r.label) + '</span>' +
            '<span class="bar-track"><span class="bar-fill" style="width:' + Math.round((r.c / max) * 100) + '%"></span></span>' +
            '<span class="bar-val">' + r.c + '</span></div>';
        }).join('');
      }
      API.adminAnalytics().then(function (d) {
        var t = d.totals;
        var signups = (d.signupsByDay || []).slice().reverse().map(function (r) { return { label: r.d, c: r.c }; });
        view.innerHTML =
          '<div class="section-title">Users</div><div class="dash-grid">' +
            statCard(t.totalUsers, 'Total users', 'All registered accounts.') +
            statCard(t.newUsers24h, 'New (24h)', '') +
            statCard(t.newUsers7d, 'New (7 days)', '') +
            statCard(t.activeUsers7d, 'Active (7 days)', 'Distinct users with any activity.') +
            statCard(t.supporters, 'Supporters', 'Tiers active right now.') +
            statCard(t.qualifiedReferrals, 'Qualified referrals', '') +
          '</div>' +
          '<div class="section-title">Engagement</div><div class="dash-grid">' +
            statCard(fmtDur(t.avgSessionSec), 'Avg time / session', 'Estimated from active heartbeats.') +
            statCard(t.totalSessions, 'Sessions', '') +
            statCard(t.totalPageviews, 'Page views', '') +
            statCard(t.totalClicks, 'Button clicks', '') +
          '</div>' +
          '<div class="card"><div class="section-title">Signups (last 14 days)</div>' + barList(signups) + '</div>' +
          '<div class="card"><div class="section-title">Top entry pages</div>' + barList(d.entryPages) + '</div>' +
          '<div class="card"><div class="section-title">Most viewed pages</div>' + barList(d.topPages) + '</div>' +
          '<div class="card"><div class="section-title">Most clicked buttons</div>' + barList(d.topButtons) + '</div>';
      }).catch(function () {
        view.innerHTML = '<div class="card"><div class="empty" style="padding:40px">Access denied. This page is for the platform owner only. <a href="/app">Back to OpenBook</a></div></div>';
      });

      // ---- Suggestions inbox -------------------------------------------------
      // The owner's triage view of the community suggestion board. Setting a
      // status here writes through the same /api/suggestions/:id/status endpoint
      // the in-app board and the public /roadmap read, so all three stay in sync.
      // Friendly labels match the public roadmap columns exactly.
      var SUG = [
        { v: 'open', l: 'Considering' },
        { v: 'planned', l: 'Planned' },
        { v: 'in_progress', l: 'Building now' },
        { v: 'shipped', l: 'Shipped' },
        { v: 'declined', l: 'Not planned' }
      ];
      var SUG_ORDER = { open: 0, planned: 1, in_progress: 2, shipped: 3, declined: 4 };
      function sugLabel(v) { for (var i = 0; i < SUG.length; i++) if (SUG[i].v === v) return SUG[i].l; return v; }
      var sugView = document.getElementById('sugView');

      function sugCard(s) {
        var btns = SUG.map(function (st) {
          return '<button class="btn btn-sm' + (s.status === st.v ? ' btn-primary' : '') +
            '" data-set="' + s.id + '" data-status="' + st.v + '">' + st.l + '</button>';
        }).join('');
        return '<div class="card sug"><div class="sug-row">' +
          '<div class="votebox"><span class="vscore' + (s.score > 0 ? ' pos' : (s.score < 0 ? ' neg' : '')) + '">&#9650; ' + esc(s.score) + '</span></div>' +
          '<div class="sug-main">' +
            '<div class="sug-title">' + esc(s.title) + '</div>' +
            (s.body ? '<div class="sug-body">' + esc(s.body) + '</div>' : '') +
            '<div class="sug-meta"><span class="sug-cat">' + esc(s.category) + '</span>' +
              '<span class="sug-status sug-status-' + esc(s.status) + '">' + esc(sugLabel(s.status)) + '</span>' +
              '<span>by ' + esc(s.author ? s.author.name : '?') + '</span></div>' +
            (s.statusNote ? '<div class="sug-note">&#9998; ' + esc(s.statusNote) + '</div>' : '') +
            '<div class="sug-admin">' + btns +
              '<button class="btn btn-sm" data-note="' + s.id + '">&#9998; Note</button>' +
              '<button class="btn btn-sm btn-danger" data-del="' + s.id + '">Delete</button>' +
            '</div>' +
          '</div></div></div>';
      }

      function wireSug(list) {
        var byId = {}; list.forEach(function (s) { byId[s.id] = s; });
        sugView.querySelectorAll('[data-set]').forEach(function (b) {
          b.onclick = function () {
            var id = Number(b.getAttribute('data-set')), st = b.getAttribute('data-status');
            if (byId[id] && byId[id].status === st) return;
            b.disabled = true;
            API.suggestionStatus(id, st).then(loadSug).catch(function (e) { alert(e.message); b.disabled = false; });
          };
        });
        sugView.querySelectorAll('[data-note]').forEach(function (b) {
          b.onclick = function () {
            var id = Number(b.getAttribute('data-note')), s = byId[id];
            var note = window.prompt('Public note shown under this item on the roadmap (explains the status). Leave blank to clear it:', (s && s.statusNote) || '');
            if (note === null) return;
            API.suggestionStatus(id, s.status, note.trim()).then(loadSug).catch(function (e) { alert(e.message); });
          };
        });
        sugView.querySelectorAll('[data-del]').forEach(function (b) {
          b.onclick = function () {
            var id = Number(b.getAttribute('data-del'));
            if (!window.confirm('Delete this suggestion?')) return;
            API.deleteSuggestion(id).then(loadSug).catch(function (e) { alert(e.message); });
          };
        });
      }

      function loadSug() {
        API.listSuggestions().then(function (r) {
          var counts = { open: 0, planned: 0, in_progress: 0, shipped: 0, declined: 0 };
          r.suggestions.forEach(function (s) { if (counts[s.status] != null) counts[s.status]++; });
          var chips = SUG.map(function (st) { return '<span class="adm-sug-chip"><b>' + counts[st.v] + '</b> ' + st.l + '</span>'; }).join('');
          var head = '<div class="section-title" style="margin-top:8px">&#128161; Suggestions inbox</div>' +
            '<div class="shint" style="font-size:13px;line-height:1.5">Every idea the community submits. Set a status and it updates the in-app board and the public roadmap at the same time. Add a note to explain a decision in the open.</div>' +
            '<div class="adm-sug-summary">' + chips + '</div>';
          if (!r.suggestions.length) {
            sugView.innerHTML = '<div class="card">' + head + '<div class="empty" style="padding:20px">No suggestions yet. When members suggest a fix, update, or change, it lands here for you to triage.</div></div>';
            return;
          }
          var sorted = r.suggestions.slice().sort(function (a, b) {
            return (SUG_ORDER[a.status] - SUG_ORDER[b.status]) || (b.score - a.score) || (b.id - a.id);
          });
          sugView.innerHTML = '<div class="card">' + head + '</div>' + sorted.map(sugCard).join('');
          wireSug(sorted);
        }).catch(function () {
          sugView.innerHTML = '<div class="card"><div class="empty" style="padding:20px">Could not load suggestions right now.</div></div>';
        });
      }
      loadSug();
    })();
  </script>
</body>
</html>
